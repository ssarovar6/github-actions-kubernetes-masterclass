receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"
  mysql:
    endpoint: "mysql.skillpulse.svc.cluster.local:3306" 
    username: "root"
    password: "rootpassword123" 

processors:
  batch:

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
  logging:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp, mysql]
      processors: [batch]
      exporters: [prometheus, logging]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
