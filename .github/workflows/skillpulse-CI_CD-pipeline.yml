name: CI-CD Pipeline
on:
  workflow_dispatch:

  
jobs:
  code-scan:
    uses: ./.github/workflows/code-scan.yml
  secret-scan:
    uses: ./.github/workflows/secret-scan.yml
    secrets: inherit
  build-job:
    needs: [code-scan, secret-scan]
    uses: ./.github/workflows/ci.yml
    secrets: inherit
  deploy-gitops-job:
    needs: [build-job]
    uses: ./.github/workflows/cd-k8s.yml
    secrets: inherit
    permissions:
      contents: write
  deploy-job:
    needs: [deploy-gitops-job]
    uses: ./.github/workflows/cd.yml
    secrets: inherit