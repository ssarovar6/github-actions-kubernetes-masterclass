name: 'Terraform CI/CD'

on:
  workflow_call:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "eu-west-1" 
  BUCKET_NAME: "skillpulse-bucket-state"
  TABLE_NAME: "skillpulse-table-state"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform # Path to your terraform folder

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create SSH Public Key File
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > terra-key.pub

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"

      # Step 1 & 2: Version Verification
      - name: Check CLI Versions
        run: |
          echo "=== Checking Installed Versions ==="
          aws --version
          terraform --version

      # Step 3: Pre-flight Permission & Credential Check
      - name: Verify AWS Credentials & Permissions
        run: |
          echo "=== Validating AWS Access ==="
          echo "Access Key Length: ${#AWS_ACCESS_KEY_ID}"
          echo "Secret Key Length: ${#AWS_SECRET_ACCESS_KEY}"
          
          # Check if secret variables are empty in GitHub Environment
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "❌ ERROR: AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY is missing from GitHub Secrets!"
            exit 1
          fi
          
          # Make a live API call to verify the keys are valid and have permissions
          if ! aws sts get-caller-identity; then
            echo "❌ ERROR: Invalid AWS credentials or insufficient permissions!"
            exit 1
          fi
          echo "✅ AWS Credentials verified successfully."
        
        # Ensure Terraform Backend Exists
      - name: terraform backend
        run: |
          # Create S3 Bucket if it does not exist
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "S3 bucket missing. Creating..."
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region "$AWS_DEFAULT_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_DEFAULT_REGION"
          
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
          fi

          # Create DynamoDB Table if it does not exist
          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" 2>/dev/null; then
            echo "DynamoDB table missing. Creating..."
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_DEFAULT_REGION"
          
            echo "Waiting for DynamoDB table to become active..."
            aws dynamodb wait table-exists --table-name "$TABLE_NAME"
          fi

        
      # Step 4: Terraform Initialization
      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "=== Initializing Terraform ==="
          if ! terraform init; then
            echo "❌ ERROR: Terraform init failed!"
            exit 1
          fi

      # Step 5: Terraform Validation
      - name: Terraform Validate
        run: |
          echo "=== Validating Configuration ==="
          if ! terraform validate; then
            echo "❌ ERROR: Terraform validation failed!"
            exit 1
          fi

      # Step 6: Terraform Plan
      - name: Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "=== Generating Execution Plan ==="
          if ! terraform plan -input=false; then
            echo "❌ ERROR: Terraform plan failed!"
            exit 1
          fi

      # Step 7: Terraform Apply (Executes ONLY on Main Branch Push)
      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "=== Applying Infrastructure Changes ==="
          if ! terraform apply -auto-approve -input=false; then
            echo "❌ ERROR: Terraform apply failed!"
            exit 1
          fi