name: Code & dependency Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'terraform/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  code-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' 

      # Synchronize dependency maps inside the runner environment  
      - name: Install Missing Dependencies
        run: |
          go mod download
          go mod tidy
        working-directory: ./backend

      # Official, high-performance golangci-lint runner wrapper
      - name: Execute GolangCI-Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
          working-directory: ./backend

        # dependency scan
      - name: Run Go Vulnerability Check (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version: '1.26'
          work-dir: './backend'
          go-package: './...' 

      # Official gosec pipeline compilation scanner action module
      - name: Run Gosec Security SAST Scan
        uses: securego/gosec@master
        with:
          args: ./backend/...
