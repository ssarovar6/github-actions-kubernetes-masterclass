name: Secret Scan
on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'terraform/**'
      - 'docs/**'
      - '**/*.md'
  
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        